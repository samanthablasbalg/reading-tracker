repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        files: ^backend/
        args: [--fix]
      - id: ruff-format
        files: ^backend/
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        files: ^backend/
        args: ["--config-file", "backend/pyproject.toml"]
        additional_dependencies:
          - sqlalchemy
          - fastapi
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        files: ^\.github/workflows/
  - repo: local
    hooks:
      - id: frontend-lint-staged
        name: Lint staged (frontend)
        language: system
        files: ^frontend/.*\.(ts|html|css|json)$
        entry: bash -c 'cd frontend && npx lint-staged'
        pass_filenames: false
      - id: frontend-typecheck
        name: TypeScript (frontend)
        language: system
        files: ^frontend/.*\.ts$
        entry: bash -c 'cd frontend && npm run typecheck'
        pass_filenames: false
      - id: prettier-docs
        name: Prettier (docs markdown)
        language: system
        files: ^docs/.*\.md$
        entry: bash -c 'npm --prefix frontend exec -- prettier --write "$@" && git add "$@"' --
        pass_filenames: true