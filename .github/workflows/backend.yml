name: Backend CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reading_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Ruff linter
        run: |
          cd backend
          ruff check .

      - name: Run Ruff formatter
        run: |
          cd backend
          ruff format --check .

      - name: Run mypy
        run: |
          cd backend
          mypy app

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/reading_tracker_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/reading_tracker_test
        run: |
          cd backend
          pytest || [ $? -eq 5 ]