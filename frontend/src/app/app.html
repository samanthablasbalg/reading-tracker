@if (auth.currentUser(); as user) {
  <nav mat-tab-nav-bar [tabPanel]="tabPanel">
    <a
      mat-tab-link
      routerLink="/currently-reading"
      routerLinkActive
      #rla0="routerLinkActive"
      [active]="rla0.isActive"
      >Currently reading</a
    >
    <a
      mat-tab-link
      routerLink="/concluded"
      routerLinkActive
      #rla1="routerLinkActive"
      [active]="rla1.isActive"
      >Read</a
    >
    <a
      mat-tab-link
      routerLink="/catalog"
      routerLinkActive
      #rla2="routerLinkActive"
      [active]="rla2.isActive"
      >Catalog</a
    >
    <span class="spacer"></span>
    <span class="current-user">{{ user.email }}</span>
    <button mat-button (click)="logout()">Log out</button>
  </nav>
}
<mat-tab-nav-panel #tabPanel>
  <router-outlet />
</mat-tab-nav-panel>
