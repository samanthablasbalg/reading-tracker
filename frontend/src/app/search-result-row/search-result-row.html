<li class="flex items-center gap-3 rounded-xl px-2 py-2 hover:bg-hover">
  <div class="relative w-12 h-16 rounded-md overflow-hidden flex-none bg-surface-2">
    @if (result().cover_url; as cover) {
      <img [ngSrc]="cover" fill [alt]="result().title + ' cover'" class="object-contain" />
    }
  </div>
  <div class="min-w-0 flex-1">
    <p class="font-serif font-semibold text-sm leading-tight truncate">{{ result().title }}</p>
    <p class="text-xs text-muted truncate">{{ result().authors.join(', ') }}</p>
    @if (stateLabel(); as label) {
      <span
        class="inline-flex items-center rounded-full text-label-sm px-2 py-0.5 mt-1"
        [class]="
          result().state === 'in_library'
            ? 'bg-primary/14 text-primary'
            : 'bg-surface-2 text-muted-strong border border-border'
        "
      >
        {{ label }}
      </span>
    }
  </div>
</li>
