<nav class="landing-nav">
  <div class="landing-nav__brand">
    <div class="landing-nav__mark" aria-hidden="true"></div>
    <span class="landing-nav__wordmark">Rainbow Sam Reads</span>
  </div>
  <button
    type="button"
    class="pill-btn pill-btn--outline landing-nav__login-btn"
    (click)="auth.login()"
  >
    <app-google-icon />
    Log in with Google
  </button>
</nav>

<app-hero />

<section class="trust">
  <p class="trust__eyebrow">Built solo, end to end</p>
  <p class="trust__quote">
    Designed, engineered, and shipped by one person — from the data model to the pixel-level pastel
    tints.
  </p>
</section>

<app-differentiators />

<app-features />

<app-insights-band />

<section class="final-cta">
  <h2 class="final-cta__title">Start your shelf today</h2>
  <p class="final-cta__body">One Google login. No setup, no busywork — just your books.</p>
  <button type="button" class="pill-btn pill-btn--primary final-cta__btn" (click)="auth.login()">
    <app-google-icon variant="onDark" />
    Continue with Google
  </button>
</section>

<footer class="landing-footer">
  <div class="landing-footer__inner">
    <span class="landing-footer__wordmark">Rainbow Sam Reads</span>
    <span class="landing-footer__meta">Designed &amp; built independently · {{ year }}</span>
  </div>
</footer>
